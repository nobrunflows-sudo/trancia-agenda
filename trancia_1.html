<style>
  :root {
    --red: #E01A1A;
    --black: #0A0A0A;
    --white: #FFFFFF;
    --gray-light: #F2F2F2;
    --gray-mid: #E0E0E0;
    --gray-dark: #999;
    --criativo: #E01A1A;
    --roteiro: #B01010;
    --gravacao: #7A0000;
    --pessoal: #333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 3px solid var(--black);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 100;
    flex-wrap: wrap;
    gap: 8px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--black);
    line-height: 1;
  }
  .logo span { color: var(--red); }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .week-nav button {
    width: 32px; height: 32px;
    border: 2px solid var(--black);
    background: var(--white);
    font-size: 16px;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .week-nav button:hover { background: var(--black); color: var(--white); }

  .week-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    min-width: 140px;
    text-align: center;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .sync-status {
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    border: 1.5px solid var(--gray-mid);
    color: var(--gray-dark);
    letter-spacing: 1px;
  }
  .sync-status.online { border-color: #22c55e; color: #22c55e; }
  .sync-status.syncing { border-color: var(--red); color: var(--red); }

  .notif-btn {
    width: 32px; height: 32px;
    border: 2px solid var(--black);
    background: var(--white);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    position: relative;
  }

  .notif-badge {
    position: absolute; top: -4px; right: -4px;
    width: 14px; height: 14px;
    background: var(--red); border-radius: 50%;
    font-size: 9px; color: white;
    display: none; align-items: center; justify-content: center;
    font-weight: 700;
  }

  /* LEGEND BAR */
  .legend-bar {
    display: flex;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 2px solid var(--black);
    flex-wrap: wrap;
    background: var(--white);
  }

  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: 1px;
  }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 2px solid var(--black);
    background: var(--black);
    color: var(--white);
    flex-wrap: wrap;
    overflow-x: auto;
  }

  .stat {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .stat-val { color: var(--red); font-size: 16px; }

  /* GRID WRAPPER */
  .grid-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .grid {
    display: grid;
    grid-template-columns: 44px repeat(7, minmax(44px, 1fr));
    min-width: 360px;
    border-left: 2px solid var(--black);
    border-top: 2px solid var(--black);
  }

  .day-header {
    border-right: 2px solid var(--black);
    border-bottom: 2px solid var(--black);
    padding: 6px 2px;
    text-align: center;
    background: var(--black);
    color: var(--white);
  }
  .day-header.today { background: var(--red); }
  .day-header .day-name { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; }
  .day-header .day-date { font-size: 9px; font-weight: 300; opacity: 0.7; margin-top: 1px; }

  .time-col-header {
    border-right: 2px solid var(--black);
    border-bottom: 2px solid var(--black);
    background: var(--black);
  }

  .time-label {
    border-right: 2px solid var(--black);
    border-bottom: 1px solid var(--gray-mid);
    padding: 0 4px;
    display: flex; align-items: center; justify-content: flex-end;
    height: 36px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--gray-dark);
    background: var(--white);
  }

  .cell {
    border-right: 2px solid var(--black);
    border-bottom: 1px solid var(--gray-mid);
    height: 36px;
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .cell:hover { background: var(--gray-light); }
  .cell.type-C { background: var(--criativo) !important; }
  .cell.type-R { background: var(--roteiro) !important; }
  .cell.type-G { background: var(--gravacao) !important; }
  .cell.type-P { background: var(--pessoal) !important; }

  .cell-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--white);
    pointer-events: none;
    user-select: none;
  }
  .cell.type-C .cell-label::before { content: 'C'; }
  .cell.type-R .cell-label::before { content: 'R'; }
  .cell.type-G .cell-label::before { content: 'G'; }
  .cell.type-P .cell-label::before { content: 'P'; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border: 3px solid var(--black);
    padding: 24px;
    width: 100%;
    max-width: 340px;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 3px; margin-bottom: 4px;
  }
  .modal .modal-time { font-size: 12px; color: var(--gray-dark); margin-bottom: 20px; font-weight: 500; }

  .modal-types {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 16px;
  }

  .type-btn {
    padding: 12px; border: 2px solid var(--black);
    background: var(--white); cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; font-size: 15px;
    letter-spacing: 2px; transition: all 0.15s; text-align: center;
  }
  .type-btn:hover, .type-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }
  .type-btn.btn-R:hover, .type-btn.btn-R.active { background: var(--roteiro); border-color: var(--roteiro); }
  .type-btn.btn-G:hover, .type-btn.btn-G.active { background: var(--gravacao); border-color: var(--gravacao); }
  .type-btn.btn-P:hover, .type-btn.btn-P.active { background: var(--pessoal); border-color: var(--pessoal); }

  .modal-note {
    width: 100%; border: 2px solid var(--black);
    padding: 8px 10px; font-family: 'Inter', sans-serif;
    font-size: 13px; resize: none; outline: none;
    margin-bottom: 16px; height: 60px;
  }

  .modal-actions { display: flex; gap: 8px; }

  .btn-save {
    flex: 1; padding: 10px;
    background: var(--black); color: var(--white);
    border: 2px solid var(--black);
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 2px; cursor: pointer;
  }
  .btn-save:hover { background: var(--red); border-color: var(--red); }
  .btn-clear {
    padding: 10px 14px; background: var(--white); color: var(--black);
    border: 2px solid var(--black);
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 1px; cursor: pointer;
  }
  .btn-cancel {
    padding: 10px 14px; background: var(--white); color: var(--gray-dark);
    border: 2px solid var(--gray-mid);
    font-family: 'Bebas Neue', sans-serif; font-size: 16px; cursor: pointer;
  }

  /* NOTIF PANEL */
  .notif-panel {
    position: fixed; top: 60px; right: 16px;
    width: 280px; background: var(--white);
    border: 2px solid var(--black); z-index: 150;
    display: none; max-height: 350px; overflow-y: auto;
  }
  .notif-panel.open { display: block; }
  .notif-header {
    padding: 10px 14px; border-bottom: 2px solid var(--black);
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    letter-spacing: 2px; display: flex; justify-content: space-between;
    align-items: center; background: var(--black); color: var(--white);
  }
  .notif-clear { font-size: 10px; cursor: pointer; opacity: 0.6; }
  .notif-item { padding: 10px 14px; border-bottom: 1px solid var(--gray-mid); font-size: 12px; line-height: 1.5; }
  .notif-item .notif-type { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; color: var(--red); }
  .notif-item .notif-time { color: var(--gray-dark); font-size: 10px; margin-top: 2px; }
  .notif-empty { padding: 20px 14px; text-align: center; color: var(--gray-dark); font-size: 12px; }
</style>
</head>

</script>

<script>
const DAYS = ['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];
const DAYS_FULL = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const HOURS = Array.from({length:15}, (_,i) => 8+i);

let currentWeekOffset = 0;
let agendaData = {};
let selectedCell = null;
let selectedType = null;
let notifications = [];
let fbListening = false;

function getWeekDates(offset=0) {
  const now = new Date();
  const day = now.getDay();
  const diff = (day===0 ? -6 : 1-day);
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff + offset*7);
  monday.setHours(0,0,0,0);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}

function weekKey(offset) {
  const dates = getWeekDates(offset);
  return 'w'+dates[0].toISOString().slice(0,10);
}

function formatDate(d) {
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function loadData() {
  try {
    const raw = localStorage.getItem('trancia_agenda');
    if (raw) agendaData = JSON.parse(raw);
  } catch(e) {}
}

function saveLocal() {
  localStorage.setItem('trancia_agenda', JSON.stringify(agendaData));
}

function syncToFirebase() {
  if (!window._fbOk) return;
  const el = document.getElementById('syncStatus');
  el.textContent = '● SINCRONIZANDO';
  el.className = 'sync-status syncing';
  try {
    const r = window._fbRef(window._fbDB, 'trancia/agenda');
    window._fbSet(r, agendaData).then(() => {
      el.textContent = '● ONLINE';
      el.className = 'sync-status online';
    }).catch(e => {
      console.log('Sync error:', e);
      el.textContent = '● ERRO';
      el.className = 'sync-status';
    });
  } catch(e) { console.log(e); }
}

function startListening() {
  if (!window._fbOk || fbListening) return;
  fbListening = true;
  try {
    const r = window._fbRef(window._fbDB, 'trancia/agenda');
    window._fbOnValue(r, (snapshot) => {
      const data = snapshot.val();
      const el = document.getElementById('syncStatus');
      el.textContent = '● ONLINE';
      el.className = 'sync-status online';
      if (data) {
        const oldStr = JSON.stringify(agendaData);
        agendaData = data;
        saveLocal();
        if (JSON.stringify(data) !== oldStr) {
          addNotification('Agenda atualizada!');
          renderGrid();
          updateStats();
        }
      }
    }, (error) => {
      console.log('Firebase listen error:', error);
      document.getElementById('syncStatus').textContent = '● OFFLINE';
      document.getElementById('syncStatus').className = 'sync-status';
    });
  } catch(e) { console.log(e); }
}

function renderGrid() {
  const grid = document.getElementById('agendaGrid');
  const dates = getWeekDates(currentWeekOffset);
  const wk = weekKey(currentWeekOffset);
  document.getElementById('weekLabel').textContent = formatDate(dates[0])+' — '+formatDate(dates[6]);
  grid.innerHTML = '';

  const emptyHeader = document.createElement('div');
  emptyHeader.className = 'time-col-header';
  grid.appendChild(emptyHeader);

  dates.forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'day-header'+(isToday(d)?' today':'');
    el.innerHTML = '<div class="day-name">'+DAYS[i]+'</div><div class="day-date">'+formatDate(d)+'</div>';
    grid.appendChild(el);
  });

  HOURS.forEach(hour => {
    const tl = document.createElement('div');
    tl.className = 'time-label';
    tl.textContent = hour+'h';
    grid.appendChild(tl);

    dates.forEach((_,dayIdx) => {
      const key = wk+'_'+dayIdx+'_'+hour;
      const entry = agendaData[key];
      const cell = document.createElement('div');
      cell.className = 'cell'+(entry?' marked type-'+entry.type:'');
      cell.dataset.key = key;
      if (entry) {
        const label = document.createElement('div');
        label.className = 'cell-label';
        cell.appendChild(label);
      }
      cell.addEventListener('click', () => openModal(key, dayIdx, hour));
      grid.appendChild(cell);
    });
  });
}

function openModal(key, dayIdx, hour) {
  const dates = getWeekDates(currentWeekOffset);
  selectedCell = key;
  selectedType = null;
  const entry = agendaData[key];
  document.getElementById('modalTime').textContent = DAYS_FULL[dayIdx]+', '+formatDate(dates[dayIdx])+' — '+hour+'h';
  document.getElementById('modalNote').value = entry?.note || '';
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  if (entry) { selectedType = entry.type; document.querySelector('.btn-'+entry.type)?.classList.add('active'); }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  selectedCell = null; selectedType = null;
}

function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.btn-'+type)?.classList.add('active');
}

function saveCell() {
  if (!selectedCell || !selectedType) { alert('Selecione um tipo!'); return; }
  const note = document.getElementById('modalNote').value.trim();
  agendaData[selectedCell] = { type: selectedType, note };
  saveLocal();
  syncToFirebase();
  closeModal();
  renderGrid();
  updateStats();
}

function clearCell() {
  if (!selectedCell) return;
  delete agendaData[selectedCell];
  saveLocal();
  syncToFirebase();
  closeModal();
  renderGrid();
  updateStats();
}

function updateStats() {
  const wk = weekKey(currentWeekOffset);
  let c=0,r=0,g=0,p=0,total=0;
  Object.keys(agendaData).forEach(k => {
    if (!k.startsWith(wk)) return;
    total++;
    const t = agendaData[k].type;
    if(t==='C')c++; if(t==='R')r++; if(t==='G')g++; if(t==='P')p++;
  });
  document.getElementById('statC').textContent = c;
  document.getElementById('statR').textContent = r;
  document.getElementById('statG').textContent = g;
  document.getElementById('statP').textContent = p;
  document.getElementById('statFree').textContent = (HOURS.length*7)-total;
}

function changeWeek(dir) { currentWeekOffset+=dir; renderGrid(); updateStats(); }
function goToToday() { currentWeekOffset=0; renderGrid(); updateStats(); }

function addNotification(msg) {
  const now = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  notifications.unshift({msg,time:now});
  if(notifications.length>20) notifications.pop();
  renderNotifs();
}

function renderNotifs() {
  const list = document.getElementById('notifList');
  const badge = document.getElementById('notifBadge');
  if(!notifications.length) { list.innerHTML='<div class="notif-empty">Nenhuma notificação</div>'; badge.style.display='none'; return; }
  badge.style.display='flex'; badge.textContent=Math.min(notifications.length,9);
  list.innerHTML=notifications.map(n=>'<div class="notif-item"><div class="notif-type">TRANCIA</div><div>'+n.msg+'</div><div class="notif-time">'+n.time+'</div></div>').join('');
}

function clearNotifs() { notifications=[]; renderNotifs(); }
function toggleNotif() { document.getElementById('notifPanel').classList.toggle('open'); }

document.getElementById('modalOverlay').addEventListener('click', e => {
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});

if(Notification.permission==='default') Notification.requestPermission();

// Init
loadData();
renderGrid();
updateStats();

// Start Firebase after modules load
setTimeout(() => { startListening(); }, 2000);

// Expose globals
window.changeWeek=changeWeek; window.goToToday=goToToday;
window.closeModal=closeModal; window.selectType=selectType;
window.saveCell=saveCell; window.clearCell=clearCell;
window.toggleNotif=toggleNotif; window.clearNotifs=clearNotifs;
</script>


</body></html>
